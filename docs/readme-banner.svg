<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Xiaomi MiMo V2.5 TTS Web preview banner">
  <defs>
    <linearGradient id="bg" x1="80" y1="0" x2="1520" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06111F" />
      <stop offset="0.52" stop-color="#0B1A2F" />
      <stop offset="1" stop-color="#111A2E" />
    </linearGradient>
    <linearGradient id="panel" x1="100" y1="120" x2="1500" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="rgba(255,255,255,0.14)" />
      <stop offset="1" stop-color="rgba(255,255,255,0.06)" />
    </linearGradient>
    <linearGradient id="accent" x1="100" y1="100" x2="300" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67E8F9" />
      <stop offset="1" stop-color="#A78BFA" />
    </linearGradient>
    <linearGradient id="accentSoft" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse">
      <stop stop-color="rgba(103,232,249,0.22)" />
      <stop offset="1" stop-color="rgba(103,232,249,0.08)" />
    </linearGradient>
    <linearGradient id="buttonFill" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop stop-color="#67E8F9" />
      <stop offset="0.5" stop-color="#38BDF8" />
      <stop offset="1" stop-color="#A78BFA" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#020617" flood-opacity="0.48" />
    </filter>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1" />
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.8" />
  <rect x="56" y="56" width="1488" height="788" rx="30" fill="rgba(8,15,27,0.72)" stroke="rgba(148,163,184,0.16)" filter="url(#shadow)" />

