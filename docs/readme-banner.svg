  <text x="123" y="139" text-anchor="middle" font-family="Inter, Segoe UI, Microsoft YaHei, sans-serif" font-size="28" font-weight="800" fill="#04111C">M</text>

  <text x="172" y="132" font-family="Inter, Segoe UI, Microsoft YaHei, sans-serif" font-size="56" font-weight="800" fill="#F8FAFC">Xiaomi MiMo V2.5 TTS Web</text>
  <text x="172" y="184" font-family="Inter, Segoe UI, Microsoft YaHei, sans-serif" font-size="25" font-weight="600" fill="#CBD5E1">Unofficial local workbench for Xiaomi MiMo V2.5 TTS</text>
  <text x="172" y="224" font-family="Inter, Segoe UI, Microsoft YaHei, sans-serif" font-size="18" font-weight="400" fill="#94A3B8">Proxy-first architecture, browser-local sample storage, and a single-screen generation workflow.</text>

  <g font-family="Inter, Segoe UI, Microsoft YaHei, sans-serif" font-size="16" font-weight="700" fill="#E2E8F0">
