  <text x="508" y="674" font-family="Inter, Segoe UI, Microsoft YaHei, sans-serif" font-size="17" font-weight="600" fill="#E2E8F0">我想把这份轻松和愉快分享给你，然后用自然、平稳的语速读清楚。</text>
